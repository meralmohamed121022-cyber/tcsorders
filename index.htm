<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCS Order Portal</title>
    <style>
        :root {
            --dark-blue: #1a365d;
            --orange: #f6ad55;
            --white: #ffffff;
            --bg-light: #f7fafc;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-light);
            overflow: hidden; /* لمنع السكرول الخارجي */
        }

        /* حاوية الإدخال */
        #main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(26, 54, 93, 0.1);
            text-align: center;
            width: 100%;
            max-width: 380px;
            border-top: 8px solid var(--dark-blue);
        }

        h1 { color: var(--dark-blue); margin-bottom: 10px; }
        p { color: #4a5568; margin-bottom: 30px; }

        .input-box {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }

        #view-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--dark-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        /* واجهة العرض (iFrame) */
        #viewer-section {
            display: none; /* مخفي في البداية */
            width: 100%;
            height: 100vh;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* زرار الطباعة */
        .action-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 999;
        }

        .btn-action {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .print-btn { background-color: var(--orange); color: white; }
        .back-btn { background-color: var(--dark-blue); color: white; }

        /* إخفاء الأزرار عند الطباعة */
        @media print {
            .action-buttons { display: none; }
        }
    </style>
</head>
<body>

<div id="main-container">
    <div class="card">
        <h1>📦 TCS Order</h1>
        <p>Enter order number to display details</p>
        <input type="text" id="order_input" class="input-box" placeholder="Order Number..." autofocus>
        <button id="view-btn">View Inside Frame</button>
    </div>
</div>

<div id="viewer-section">
    <div class="action-buttons">
        <button class="btn-action print-btn" onclick="printFrame()">Print Order</button>
        <button class="btn-action back-btn" onclick="goBack()">Back</button>
    </div>
    <iframe id="order-frame" name="order-frame"></iframe>
</div>

<script>
    const input = document.getElementById("order_input");
    const viewBtn = document.getElementById("view-btn");
    const mainContainer = document.getElementById("main-container");
    const viewerSection = document.getElementById("viewer-section");
    const iframe = document.getElementById("order-frame");

    viewBtn.addEventListener('click', function(){
        const orderId = input.value.trim();
        if(orderId === "") {
            alert("يرجى إدخال رقم الطلب");
            return;
        }

        const targetUrl = `https://www.portals-ksa.com/medications/order.php?order_id=${orderId}&branch_id=10473&lang=En`;
        
        // تحميل الرابط داخل الفريم
        iframe.src = targetUrl;
        
        // تبديل الواجهات
        mainContainer.style.display = 'none';
        viewerSection.style.display = 'block';
    });

    function printFrame() {
        const frame = document.getElementById('order-frame').contentWindow;
        frame.focus();
        frame.print();
    }

    function goBack() {
        viewerSection.style.display = 'none';
        mainContainer.style.display = 'flex';
        iframe.src = '';
    }

    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") viewBtn.click();
    });
</script>

</body>
</html>
